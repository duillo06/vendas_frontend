name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend/nginx image
        run: |
          docker build \
            -f deploy/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://api.foodservice.app/api/v1 \
            --build-arg VITE_DEFAULT_TENANT_SUBDOMAIN=demo \
            -t foodservice-frontend:ci \
            .
